# GitHub Pages — publiczny link: https://<user>.github.io/<repo>/
name: Deploy to GitHub Pages

# Uruchamia się przy pushu tylko na te gałęzie — jeśli pracujesz np. na `develop`,
# dopisz ją do listy albo zrób merge do `main`, albo użyj „Run workflow” (workflow_dispatch).
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Ścieżka podstrony GitHub Pages (nazwa repozytorium)
          VITE_BASE_PATH: ${{ github.event.repository.name }}
        run: npm run build

      - name: Disable Jekyll (GitHub Pages)
        run: touch dist/.nojekyll

      # v4: domyślnie pomija pliki ukryte — .nojekyll musi wejść do artefaktu
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
